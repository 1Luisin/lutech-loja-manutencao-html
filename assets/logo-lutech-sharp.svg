<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Logo da Lutech</title>
  <desc id="desc">Logo da Lutech com notebook estilizado em branco sobre fundo em degrade azul e verde.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c4d57" />
      <stop offset="55%" stop-color="#0b2740" />
      <stop offset="100%" stop-color="#071126" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ece6" />
      <stop offset="100%" stop-color="#dffdfc" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#02101d" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="1200" rx="90" fill="url(#bg)" />

  <g filter="url(#softShadow)">
    <g fill="none" stroke="#f8fbff" stroke-linecap="round" stroke-linejoin="round">
      <rect x="380" y="300" width="320" height="235" rx="24" stroke-width="24" />
      <path d="M312 645H768L710 708H370Z" stroke-width="24" />
      <path d="M735 248C842 288 901 352 926 440" stroke-width="28" />
      <path d="M705 270C788 319 835 381 855 456" stroke-width="24" opacity="0.94" />
      <path d="M318 614C362 531 404 464 462 403" stroke-width="24" opacity="0.94" />
      <path d="M287 584C329 499 380 420 447 356" stroke-width="20" opacity="0.82" />
      <path d="M624 540C726 500 815 428 880 320" stroke-width="28" />
    </g>

    <text x="600" y="848" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="126" font-weight="800" letter-spacing="0">
      <tspan fill="url(#accent)">LU</tspan>
      <tspan fill="#f8fbff">TECH</tspan>
    </text>

    <text x="600" y="912" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="600" fill="#8cb8c2" letter-spacing="4">
      MANUTENCAO E TECNOLOGIA
    </text>
  </g>
</svg>
